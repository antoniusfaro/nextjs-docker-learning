name: Docker Image Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Debug Commit
        run: |
          git log --oneline -n 3

      - name: Verify Built Image
        run: |
          docker run --rm ghcr.io/antoniusfaro/nextjs-docker-learning:latest cat /app/app/page.tsx

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          docker build --no-cache \
            -t ghcr.io/antoniusfaro/nextjs-docker-learning:$IMAGE_TAG .

          docker push ghcr.io/antoniusfaro/nextjs-docker-learning:$IMAGE_TAG
        # docker build --no-cache -t ghcr.io/antoniusfaro/nextjs-docker-learning:latest .

        # docker push ghcr.io/antoniusfaro/nextjs-docker-learning:latest
        #docker build -t ghcr.io/antoniusfaro/nextjs-docker-learning:latest .
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            export APP_NAME="${{ secrets.APP_NAME }}"
            docker pull ghcr.io/antoniusfaro/nextjs-docker-learning:${{ github.sha }}

            docker stop nextjs-app || true
            docker rm nextjs-app || true

            docker run -d \
              --name nextjs-app \
              -p 127.0.0.1:3000:3000 \
              --restart unless-stopped \
              ghcr.io/antoniusfaro/nextjs-docker-learning:${{ github.sha }}
